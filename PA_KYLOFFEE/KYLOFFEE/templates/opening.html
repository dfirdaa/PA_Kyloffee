{% extends 'base.html' %}
{% block title %}Kyloffee - Pilih Role{% endblock %}
{% block body %}
<main class="auth-page opening-page">
    <section class="opening-card">
        <div class="brand-center">
            <img src="{{ url_for('static', filename='assets/logo-coffee.png') }}" alt="Kyloffee" class="brand-logo">
            <h1>Kyloffee</h1>
            <p>Pilih akses untuk masuk ke sistem Kyloffee.</p>
        </div>

        <div class="role-grid">
            <a href="{{ url_for('register_owner') }}" class="role-card">
                <span class="role-icon">♛</span>
                <strong>Owner</strong>
                <small>Daftar sebagai pemilik toko</small>
            </a>
            <a href="{{ url_for('register_staff') }}" class="role-card">
                <span class="role-icon">☕</span>
                <strong>Staff</strong>
                <small>Daftar sebagai kasir/staff</small>
            </a>
        </div>

        <p class="auth-switch">Sudah punya akun? <a href="{{ url_for('login') }}">Login</a></p>
    </section>
</main>
{% endblock %}
